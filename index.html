<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leads Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #222; }
  header { background: #111; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  header h1 span { background: #00c853; color: #000; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
  .gear-btn { background: none; border: 1px solid #444; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .gear-btn:hover { border-color: #aaa; color: #fff; }
  .container { max-width: 1200px; margin: 28px auto; padding: 0 24px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .fields { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
  label { display: block; font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  input[type=text], input[type=password] { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input:focus { border-color: #00c853; }
  .btn { padding: 11px 24px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #333; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  .btn-green { background: #00c853; color: #000; }
  .btn-green:hover { background: #00b048; }
  .btn-blue { background: #1976d2; color: #fff; }
  .btn-blue:hover { background: #1565c0; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }
  #status { text-align: center; padding: 48px; color: #999; font-size: 14px; }
  .progress { text-align: center; padding: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 4px; margin-top: 8px; }
  .progress-fill { height: 100%; background: #00c853; border-radius: 4px; transition: width 0.3s; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #111; color: #fff; padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .rating { color: #f59e0b; font-weight: 700; }
  .no-site { color: #e53935; font-weight: 700; font-size: 11px; }
  a { color: #1976d2; text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }
  .social a { margin-right: 6px; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f5f5f5; color: #333; font-weight: 600; }
  .social a:hover { background: #e0e0e0; text-decoration: none; }
  .email-cell { font-size: 12px; color: #333; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-ok { background: #e8f5e9; color: #2e7d32; }
  .badge-no { background: #fce4ec; color: #c62828; }
  .hidden { display: none !important; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 14px; padding: 32px; width: 480px; max-width: 90vw; }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  @media (max-width: 640px) { .fields { grid-template-columns: 1fr; } th, td { padding: 8px 10px; } }
</style>
</head>
<body>

<header>
  <h1>Leads Finder <span>Google Maps</span></h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="key-status" style="font-size:12px;font-weight:600"></span>
    <button class="gear-btn" onclick="openSettings()">⚙ Configurações</button>
  </div>
</header>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-bg hidden">
  <div class="modal">
    <h2>Configurações de API</h2>
    <div class="modal-field">
      <label>Google Maps API Key</label>
      <input type="text" id="cfg-google" placeholder="AIza..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div class="modal-field">
      <label>Hunter.io API Key <small style="color:#999;text-transform:none;font-weight:400">(para buscar emails)</small></label>
      <input type="text" id="cfg-hunter" placeholder="Sua chave do Hunter.io" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancelar</button>
      <button class="btn btn-green" onclick="saveSettings()">Salvar</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="fields">
      <div>
        <label>Nicho / Tipo de negócio</label>
        <input id="nicho" type="text" placeholder="Ex: clínica de estética, dentista, academia..."/>
      </div>
      <div>
        <label>Cidade</label>
        <input id="cidade" type="text" placeholder="Ex: São Paulo, SP"/>
      </div>
      <div>
        <button class="btn" id="btn-buscar" onclick="buscar()">Buscar Leads</button>
      </div>
    </div>
  </div>

  <div id="progress-area" class="card hidden">
    <div class="progress">
      <div id="progress-text">Buscando...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="results-card" class="card hidden">
    <div class="toolbar">
      <div class="toolbar-left">
        <span id="count" style="font-size:13px;color:#666;font-weight:600"></span>
        <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Todos</button>
        <button class="filter-btn" id="f-nosite" onclick="setFilter('nosite')">Sem site</button>
        <button class="filter-btn" id="f-hasemail" onclick="setFilter('hasemail')">Com email</button>
        <button class="btn btn-blue" style="padding:6px 14px;font-size:12px" onclick="enriquecer()">✦ Enriquecer (email + redes)</button>
      </div>
      <div style="display:flex;gap:8px">
        <select id="sort-select" onchange="renderTable()" style="padding:6px 10px;border-radius:8px;border:1.5px solid #ddd;font-size:12px;font-weight:600">
          <option value="default">Ordenar: padrão</option>
          <option value="nosite">Sem site primeiro</option>
          <option value="rating-desc">Maior avaliação</option>
          <option value="rating-asc">Menor avaliação</option>
        </select>
        <button class="btn btn-green" onclick="exportCSV()">⬇ Exportar CSV</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Nome</th><th>Endereço</th><th>Telefone</th><th>Site</th>
            <th>Email</th><th>Redes Sociais</th><th>Avaliação</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="status">Configure as chaves de API em ⚙ Configurações e comece a buscar leads.</div>
</div>

<script>
let leads = [];
let activeFilter = 'all';

window.addEventListener('load', updateKeyStatus);

// ─── Settings ──────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('cfg-google').value = localStorage.getItem('lf-google') || '';
  document.getElementById('cfg-hunter').value = localStorage.getItem('lf-hunter') || '';
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}
function saveSettings() {
  const g = document.getElementById('cfg-google').value.trim();
  const h = document.getElementById('cfg-hunter').value.trim();
  localStorage.setItem('lf-google', g);
  localStorage.setItem('lf-hunter', h);
  document.getElementById('settings-modal').classList.add('hidden');
  updateKeyStatus();
  document.getElementById('status').innerHTML = '<strong style="color:#00c853">✅ Configurações salvas! Pronto para buscar.</strong>';
}
function updateKeyStatus() {
  const hasKeys = localStorage.getItem('lf-google') && localStorage.getItem('lf-hunter');
  const el = document.getElementById('key-status');
  if (el) el.textContent = hasKeys ? '✅ API configurada' : '⚠️ Configure as chaves';
  el.style.color = hasKeys ? '#00c853' : '#f59e0b';
}
function getGoogle() { return localStorage.getItem('lf-google') || ''; }
function getHunter() { return localStorage.getItem('lf-hunter') || ''; }

// ─── Search ────────────────────────────────────────────────────────────────
async function buscar() {
  const key = getGoogle();
  if (!key) { openSettings(); return; }

  const nicho = document.getElementById('nicho').value.trim();
  const cidade = document.getElementById('cidade').value.trim();
  if (!nicho || !cidade) { alert('Preencha nicho e cidade.'); return; }

  leads = [];
  document.getElementById('results-card').classList.add('hidden');
  document.getElementById('status').textContent = '';
  document.getElementById('progress-area').classList.remove('hidden');
  setProgress('Buscando no Google Maps...', 10);
  document.getElementById('btn-buscar').disabled = true;

  try {
    const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': key,
        'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.websiteUri,places.rating',
      },
      body: JSON.stringify({ textQuery: `${nicho} em ${cidade}`, languageCode: 'pt-BR' }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError('Erro Google Maps: ' + (data?.error?.message || res.status));
      return;
    }

    if (!data.places || data.places.length === 0) {
      showError('Nenhum resultado encontrado.');
      return;
    }

    leads = data.places.map(p => ({
      nome: p.displayName?.text || '',
      endereco: p.formattedAddress || '',
      telefone: p.nationalPhoneNumber || '',
      site: p.websiteUri || '',
      avaliacao: p.rating || 0,
      email: '',
      instagram: '',
      facebook: '',
      linkedin: '',
    }));

    setProgress('Encontrados! Carregando resultados...', 100);
    setTimeout(() => {
      document.getElementById('progress-area').classList.add('hidden');
      document.getElementById('results-card').classList.remove('hidden');
      document.getElementById('count').textContent = `${leads.length} leads encontrados`;
      renderTable();
    }, 600);

  } catch(err) {
    showError('Erro de conexão: ' + err.message);
  }

  document.getElementById('btn-buscar').disabled = false;
}

// ─── Enrichment ────────────────────────────────────────────────────────────
async function enriquecer() {
  const hkey = getHunter();
  if (!hkey) { alert('Configure a chave do Hunter.io em ⚙ Configurações.'); openSettings(); return; }

  const withSite = leads.filter(l => l.site && !l.email);
  if (withSite.length === 0) { alert('Todos os leads já foram enriquecidos ou não possuem site.'); return; }

  document.getElementById('progress-area').classList.remove('hidden');
  setProgress(`Enriquecendo 0 de ${withSite.length}...`, 0);

  for (let i = 0; i < withSite.length; i++) {
    const lead = withSite[i];
    const pct = Math.round(((i + 1) / withSite.length) * 100);
    setProgress(`Enriquecendo ${i+1} de ${withSite.length}: ${lead.nome}`, pct);

    // Email via Hunter.io
    try {
      const domain = new URL(lead.site).hostname.replace('www.', '');
      const hRes = await fetch(`https://api.hunter.io/v2/domain-search?domain=${domain}&api_key=${hkey}&limit=1`);
      const hData = await hRes.json();
      if (hData.data?.emails?.length > 0) {
        lead.email = hData.data.emails[0].value;
      }
    } catch(_) {}

    // Social media via proxy (try multiple)
    try {
      const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(lead.site)}`,
        `https://corsproxy.io/?${encodeURIComponent(lead.site)}`,
      ];
      let html = '';
      for (const proxyUrl of proxies) {
        try {
          const pRes = await fetch(proxyUrl, { signal: AbortSignal.timeout(6000) });
          if (pRes.ok) {
            const ct = pRes.headers.get('content-type') || '';
            if (ct.includes('json')) {
              const pData = await pRes.json();
              html = pData.contents || '';
            } else {
              html = await pRes.text();
            }
            if (html.length > 500) break;
          }
        } catch(_) {}
      }

      const IGNORE_IG = /\/(sharer|share|p\/|reel\/|stories\/|explore\/)/;
      const IGNORE_FB = /\/(sharer|share|plugins|dialog|login|v\d+)/;

      const igM = html.match(/(?:href|src|content)=["'][^"']*instagram\.com\/([a-zA-Z0-9_.]{2,})\/?["']/);
      const fbM = html.match(/(?:href|src|content)=["'][^"']*facebook\.com\/([a-zA-Z0-9_.]{2,}(?:\/[a-zA-Z0-9_.]+)?)\/?["']/);
      const liM = html.match(/(?:href|src|content)=["'][^"']*linkedin\.com\/(?:in|company)\/([a-zA-Z0-9_-]{2,})\/?["']/);

      if (igM && !IGNORE_IG.test(igM[1])) lead.instagram = 'https://instagram.com/' + igM[1];
      if (fbM && !IGNORE_FB.test(fbM[1])) lead.facebook = 'https://facebook.com/' + fbM[1];
      if (liM) lead.linkedin = 'https://linkedin.com/company/' + liM[1];
    } catch(_) {}

    renderTable();
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progress-area').classList.add('hidden');
  renderTable();
}

// ─── Filter & Sort ─────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  ['all','nosite','hasemail'].forEach(id => {
    document.getElementById('f-' + id)?.classList.toggle('active', id === f);
  });
  renderTable();
}

function getFiltered() {
  let list = [...leads];
  if (activeFilter === 'nosite') list = list.filter(l => !l.site);
  if (activeFilter === 'hasemail') list = list.filter(l => l.email);

  const sort = document.getElementById('sort-select').value;
  if (sort === 'nosite') list.sort((a, b) => (a.site ? 1 : -1) - (b.site ? 1 : -1));
  if (sort === 'rating-desc') list.sort((a, b) => b.avaliacao - a.avaliacao);
  if (sort === 'rating-asc') list.sort((a, b) => a.avaliacao - b.avaliacao);
  return list;
}

function renderTable() {
  const list = getFiltered();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = list.map((l, i) => `<tr>
    <td>${i+1}</td>
    <td><strong>${l.nome}</strong></td>
    <td style="max-width:200px;font-size:12px">${l.endereco}</td>
    <td style="white-space:nowrap">${l.telefone || '—'}</td>
    <td>${l.site ? `<a href="${l.site}" target="_blank">Ver site</a>` : '<span class="no-site">Sem site</span>'}</td>
    <td class="email-cell">${l.email || '—'}</td>
    <td class="social">
      ${l.instagram ? `<a href="${l.instagram}" target="_blank">IG</a>` : ''}
      ${l.facebook ? `<a href="${l.facebook}" target="_blank">FB</a>` : ''}
      ${l.linkedin ? `<a href="${l.linkedin}" target="_blank">LI</a>` : ''}
      ${!l.instagram && !l.facebook && !l.linkedin ? '—' : ''}
    </td>
    <td class="rating">${l.avaliacao ? '★ ' + l.avaliacao : '—'}</td>
  </tr>`).join('');
  document.getElementById('count').textContent = `${list.length} de ${leads.length} leads`;
}

// ─── Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const list = getFiltered();
  if (!list.length) return;
  const header = ['Nome','Endereço','Telefone','Site','Email','Instagram','Facebook','LinkedIn','Avaliação'];
  const rows = list.map(l => [l.nome,l.endereco,l.telefone,l.site,l.email,l.instagram,l.facebook,l.linkedin,l.avaliacao]
    .map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [header.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download = 'leads.csv';
  a.click();
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function setProgress(text, pct) {
  document.getElementById('progress-text').textContent = text;
  document.getElementById('progress-fill').style.width = pct + '%';
}
function showError(msg) {
  document.getElementById('progress-area').classList.add('hidden');
  document.getElementById('status').textContent = msg;
  document.getElementById('btn-buscar').disabled = false;
}

// Init
if (!getGoogle()) {
  document.getElementById('status').textContent = 'Configure as chaves de API em ⚙ Configurações para começar.';
}
</script>
</body>
</html>
